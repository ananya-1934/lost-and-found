<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost & Found Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">L&F Portal</a>
            <div class="nav-links">
                <a href="index.html">Browse</a>
                <a href="#" id="theme-toggle"><i class="fas fa-moon"></i></a>
                <!-- These will toggle via JS based on auth state -->
                <div id="auth-links">
                    <a href="login.html" class="btn btn-primary">Sign In</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <!-- Hero Section -->
        <section class="hero">
            <h1>Reunite with what matters.</h1>
            <p>The modern platform for reporting and finding lost items in your community. Quick, secure, and community-driven.</p>
            <div class="hero-actions">
                <a href="post.html?type=lost" class="btn btn-primary"><i class="fas fa-box-open"></i> I Lost Something</a>
                <a href="post.html?type=found" class="btn glass"><i class="fas fa-map-marker-alt"></i> I Found Something</a>
            </div>
        </section>

        <!-- Search & Filter -->
        <section class="search-container glass">
            <input type="text" id="search-input" placeholder="Search items (e.g. keys, phone)...">
            <select id="category-filter">
                <option value="">All Categories</option>
                <option value="electronics">Electronics</option>
                <option value="keys">Keys</option>
                <option value="documents">Documents</option>
                <option value="pets">Pets</option>
                <option value="other">Other</option>
            </select>
            <button class="btn btn-primary" id="search-btn">Search</button>
        </section>

        <!-- Items Grid -->
        <section>
            <h2 style="margin-bottom: 2rem;">Recent Reports</h2>
            <div class="items-grid" id="items-grid">
                <!-- Items will be dynamically loaded here by firestore.js -->
            </div>
        </section>
    </main>

    <!-- Global Scripts -->
    <script src="js/app.js"></script>
    
    <!-- Firebase Logic -->
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/firestore.js"></script>
</body>
</html>
