<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - L&F</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">L&F Admin</a>
            <div class="nav-links">
                <a href="index.html">Back to Site</a>
                <a href="#" id="theme-toggle"><i class="fas fa-moon"></i></a>
            </div>
        </div>
    </nav>

    <main>
        <div class="glass" style="padding: 2rem; border-radius: 16px; margin-bottom: 2rem; background: rgba(220, 38, 38, 0.1); border-color: rgba(220, 38, 38, 0.3);">
            <h2 style="color: #ef4444;">Admin Moderation Panel</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Global access to all system reports. Delete spam items.</p>
        </div>

        <section>
            <h3 style="margin-bottom: 1.5rem;">All Active Reports</h3>
            <div class="items-grid" id="admin-items-grid">
                <p style="color: var(--text-muted);"><i class="fas fa-spinner fa-spin"></i> Loading all database items...</p>
            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module">
        import { auth, db } from './js/firebase-init.js';
        import { collection, query, orderBy, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        
        // In a real app, you would check auth.currentUser.isAdmin here.
        async function loadAllAdminItems() {
            const grid = document.getElementById('admin-items-grid');
            try {
                const q = query(collection(db, "items"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                grid.innerHTML = '';
                if (querySnapshot.empty) {
                    grid.innerHTML = '<p>Database is empty.</p>';
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const card = document.createElement('div');
                    card.className = 'item-card glass';
                    card.innerHTML = `
                        <div class="item-content">
                            <h3 class="item-title">${data.title}</h3>
                            <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;">User ID: ${data.userId}</p>
                            <p class="item-desc">${data.description}</p>
                            <button class="btn delete-btn" data-id="${docSnap.id}" style="width: 100%; background: #ef4444; color: white;">Delete Permanently</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        if(confirm("ADMIN: Permanently delete this post?")) {
                            const id = e.target.getAttribute('data-id');
                            await deleteDoc(doc(db, "items", id));
                            window.location.reload();
                        }
                    });
                });

            } catch (error) {
                console.error(error);
                grid.innerHTML = '<p>Error loading admin data.</p>';
            }
        }

        // Call load immediately (ignoring auth check for this demo)
        loadAllAdminItems();
    </script>
</body>
</html>
