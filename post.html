<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Item - Lost & Found Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">L&F Portal</a>
            <div class="nav-links">
                <a href="index.html">Browse</a>
                <a href="#" id="theme-toggle"><i class="fas fa-moon"></i></a>
                <div id="auth-links">
                    <!-- Handled by auth.js -->
                </div>
            </div>
        </div>
    </nav>

    <main>
        <div class="form-container glass">
            <h2 style="text-align: center; margin-bottom: 2rem;">Report an Item</h2>
            <form id="post-item-form">
                
                <div class="form-group">
                    <label for="post-type">Report Type</label>
                    <select id="post-type" required>
                        <option value="lost">I lost something</option>
                        <option value="found">I found something</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="post-title">Item Title</label>
                    <input type="text" id="post-title" required placeholder="e.g. iPhone 14 Pro Max">
                </div>

                <div class="form-group">
                    <label for="post-category">Category</label>
                    <select id="post-category" required>
                        <option value="electronics">Electronics</option>
                        <option value="keys">Keys</option>
                        <option value="documents">Documents</option>
                        <option value="pets">Pets</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="post-location">Location</label>
                    <input type="text" id="post-location" required placeholder="Where was it lost/found?">
                </div>
                
                <div class="form-group">
                    <label for="post-date">Date</label>
                    <input type="date" id="post-date" required>
                </div>

                <div class="form-group">
                    <label for="post-desc">Description</label>
                    <textarea id="post-desc" rows="4" required placeholder="Provide distinguishing details..."></textarea>
                </div>

                <!-- Simulated Image Upload -->
                <div class="form-group">
                    <label for="post-image">Image</label>
                    <input type="file" id="post-image" accept="image/*">
                    <small style="color: var(--text-muted); display: block; margin-top: 5px;">(Firebase Storage required for live upload. Select an image for simulation.)</small>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Submit Report</button>
            </form>
        </div>
    </main>

    <!-- Global App Logic -->
    <script src="js/app.js"></script>
    
    <!-- Firebase Logic -->
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/firestore.js"></script>
    
    <script>
        // Auto-select type based on URL parameter (e.g. ?type=lost)
        const urlParams = new URLSearchParams(window.location.search);
        const typeParam = urlParams.get('type');
        if (typeParam === 'lost' || typeParam === 'found') {
            document.getElementById('post-type').value = typeParam;
        }
    </script>
</body>
</html>
