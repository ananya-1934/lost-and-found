<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - Lost & Found</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">L&F Portal</a>
            <div class="nav-links">
                <a href="index.html">Browse</a>
                <a href="#" id="theme-toggle"><i class="fas fa-moon"></i></a>
                <div id="auth-links">
                    <!-- Auth links will inject here -->
                </div>
            </div>
        </div>
    </nav>

    <main>
        <div class="glass" style="padding: 2rem; border-radius: 16px; margin-bottom: 2rem;">
            <h2>My Dashboard</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Manage your active reports and claims.</p>
        </div>

        <section>
            <h3 style="margin-bottom: 1.5rem;">My Active Items</h3>
            <div class="items-grid" id="dashboard-items-grid">
                <!-- User's items will load here -->
                <p style="color: var(--text-muted);"><i class="fas fa-spinner fa-spin"></i> Loading your items...</p>
            </div>
        </section>
    </main>

    <!-- Global App Logic -->
    <script src="js/app.js"></script>
    
    <!-- Firebase Logic -->
    <script type="module" src="js/auth.js"></script>
    <script type="module">
        import { auth, db } from './js/firebase-init.js';
        import { collection, query, where, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            const grid = document.getElementById('dashboard-items-grid');
            try {
                const q = query(collection(db, "items"), where("userId", "==", user.uid));
                const querySnapshot = await getDocs(q);
                
                grid.innerHTML = '';
                
                if (querySnapshot.empty) {
                    grid.innerHTML = '<p style="color: var(--text-muted);">You have not reported any items yet.</p>';
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const card = document.createElement('div');
                    card.className = 'item-card glass';
                    card.innerHTML = `
                        <div class="item-image-placeholder" style="height: 120px;">
                            <span class="badge ${data.type === 'lost' ? 'badge-lost' : 'badge-found'}">${data.type.toUpperCase()}</span>
                        </div>
                        <div class="item-content">
                            <h3 class="item-title">${data.title}</h3>
                            <p style="font-size: 0.85rem; margin-bottom: 1rem; color: var(--text-muted);">Status: ${data.status}</p>
                            <button class="btn btn-primary delete-btn" data-id="${docSnap.id}" style="width: 100%; background: #ef4444;">Delete Post</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                // Attach delete listeners
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        if(confirm("Are you sure you want to delete this post?")) {
                            const id = e.target.getAttribute('data-id');
                            await deleteDoc(doc(db, "items", id));
                            window.location.reload();
                        }
                    });
                });

            } catch (error) {
                console.error("Dashboard error:", error);
                grid.innerHTML = '<p style="color: var(--text-muted);">Could not load your items.</p>';
            }
        });
    </script>
</body>
</html>
